# 待测模型配置
target_models:
  - name: "deepseek/deepseek-r1" # 假设通过 OpenRouter 调用 R1
    provider: "custom"
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"
    temperature: 0.6
    max_tokens: 4096
  - name: "qwen-max"
    provider: "aliyun"
    api_key_env: "OPENAI_API_KEY"
    temperature: 0.1
    max_tokens: 2048