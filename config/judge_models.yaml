# 评审模型配置（多模型评审）
judge_models:
  - name: "gpt-4o-mini" # 用户指的 gpt-41-mini
    provider: "custom"
    base_url: "https://api.aaaapi.com/v1"
    api_key_env: "THIRD_PARTY_PROXY_API_KEY"
    temperature: 0.1
    max_tokens: 2048
    weight: 1.0

  - name: "qwen/qwen-plus" # 通过 OpenRouter 调用
    provider: "custom"
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"
    temperature: 0.1
    max_tokens: 2048
    weight: 1.0